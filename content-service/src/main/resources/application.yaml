spring:
  application:
    name: content-service
  datasource:
    url: jdbc:mysql://localhost:3306/netflix_content_db
    username:
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info
